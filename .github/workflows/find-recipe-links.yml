name: Find recipe links

# Manually-triggered, no-terminal batch run of the recipe-link finder.
# Trigger it from GitHub: Actions tab -> "Find recipe links" -> Run workflow.
# It runs the same `npm run find-urls` script, on GitHub's servers, and writes
# found URLs to your sheet. Re-runnable: it skips recipes that already have a link.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Max recipes to process this run (0 = no cap, as many as possible)"
        required: false
        default: "0"
      book:
        description: "Only this book (substring match); blank = all books"
        required: false
        default: ""
      dry_run:
        description: "Preview only — find matches but do NOT write to the sheet"
        type: boolean
        required: false
        default: false

# Don't let two runs write the sheet at the same time.
concurrency:
  group: find-recipe-links
  cancel-in-progress: false

jobs:
  find-links:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Run the link finder
        shell: bash
        env:
          # Required — copy these from your Vercel project settings.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          GOOGLE_PRIVATE_KEY: ${{ secrets.GOOGLE_PRIVATE_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          SHEET_TAB_NAME: ${{ secrets.SHEET_TAB_NAME }}
          # Optional.
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
          RECIPE_FINDER_MODEL: ${{ secrets.RECIPE_FINDER_MODEL }}
          RECIPE_URL_COLUMN: ${{ secrets.RECIPE_URL_COLUMN }}
          # Inputs are passed via env (never interpolated into the command) to
          # avoid shell/command injection.
          LIMIT: ${{ inputs.limit }}
          BOOK: ${{ inputs.book }}
          DRY: ${{ inputs.dry_run }}
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ] || [ -z "$GOOGLE_PRIVATE_KEY" ] || [ -z "$SHEET_ID" ]; then
            echo "::error::Missing required secrets. Add ANTHROPIC_API_KEY, GOOGLE_SERVICE_ACCOUNT_EMAIL, GOOGLE_PRIVATE_KEY, SHEET_ID, and SHEET_TAB_NAME under Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          ARGS=(--limit "${LIMIT:-0}")
          [ "$DRY" = "true" ] && ARGS+=(--dry-run)
          [ -n "$BOOK" ] && ARGS+=(--book "$BOOK")
          echo "Running: find-urls ${ARGS[*]}"
          npm run find-urls -- "${ARGS[@]}"
